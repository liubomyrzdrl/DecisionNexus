services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dn
      POSTGRES_PASSWORD: lybomyr1985
      POSTGRES_DB: dn_db
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://dn:lybomyr1985@db:5432/dn_db

  frontend:
    build:
      context: ./frontend
    command: npm run dev
    volumes:
       - ./frontend:/app
       - /app/node_modules
       - /app/.next
    ports:
      - "3000:3000"